<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日仪表盘 · 倒计时到 2026-09-01</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #ffffff;
    --surface:   #ffffff;
    --surface-2: #f7f7f5;
    --border:    #e8e8e4;
    --border-h:  #d4d4d0;
    --text:      #37352f;
    --text-2:    #787774;
    --text-3:    #b4b4b0;
    --accent:    #2eaadc;
    --accent-h:  #1a9dc9;
    --red:       #e03e3e;
    --green:     #0f7b6c;
    --yellow:    #dfab01;
    --purple:    #6940a5;
    --radius:    6px;
    --radius-lg: 10px;
    --font:      -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --mono:      'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --shadow:    0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }

  html { font-size: 16px; }
  body {
    font-family: var(--font);
    background: var(--surface-2);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  .header h1 {
    font-size: .9375rem; font-weight: 600;
    letter-spacing: -.01em; color: var(--text);
  }
  .header h1 span { color: var(--text-3); font-weight: 400; }
  .header-actions { display: flex; gap: 6px; }
  .btn-icon {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: none;
    border-radius: var(--radius);
    color: var(--text-2);
    cursor: pointer; transition: all .15s;
    font-size: 1rem;
  }
  .btn-icon:hover { background: var(--surface-2); color: var(--text); }

  .dashboard {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
  }

  .section-label {
    font-size: .75rem; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-3);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1; height: 1px;
    background: var(--border);
  }

  /* ===== Countdown ===== */
  .countdown-section { margin-bottom: 28px; }
  .countdown-card {
    padding: 36px 28px;
    background: linear-gradient(135deg, #fff 0%, #f9f8f5 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    text-align: center;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .countdown-label {
    font-size: .8125rem;
    color: var(--text-2);
    margin-bottom: 10px;
    letter-spacing: .02em;
  }
  .countdown-days {
    font-size: 4.5rem;
    font-weight: 700;
    letter-spacing: -.04em;
    line-height: 1;
    color: var(--text);
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
  }
  .countdown-unit {
    font-size: 1.125rem;
    font-weight: 500;
    color: var(--text-2);
    margin-left: 6px;
  }
  .countdown-target {
    margin-top: 14px;
    font-size: .875rem;
    color: var(--text-3);
  }
  .countdown-target strong { color: var(--text-2); font-weight: 600; }
  .countdown-sub {
    margin-top: 6px;
    font-size: .75rem;
    color: var(--text-3);
    font-family: var(--mono);
  }

  /* ===== Two column grid ===== */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 820px) {
    .grid-2 { grid-template-columns: 1fr; }
    .countdown-days { font-size: 3.25rem; }
    .dashboard { padding: 16px; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
  }
  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title {
    font-size: .8125rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--text-2);
    display: flex; align-items: center; gap: 8px;
  }
  .panel-count {
    background: var(--surface-2);
    color: var(--text-3);
    font-size: .6875rem;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
    font-family: var(--mono);
  }
  .panel-body { padding: 16px 18px; }

  /* ===== Thought form ===== */
  .form-row { display: flex; flex-direction: column; gap: 10px; }
  textarea.input {
    width: 100%;
    min-height: 90px;
    padding: 10px 12px;
    font-family: var(--font);
    font-size: .9375rem;
    color: var(--text);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    resize: vertical;
    transition: border-color .15s, background .15s;
  }
  textarea.input:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px;
    padding: 8px 16px;
    font-size: .875rem;
    font-weight: 500;
    color: #fff;
    background: var(--text);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background .15s, transform .08s;
  }
  .btn:hover { background: #222; }
  .btn:active { transform: translateY(1px); }
  .btn.btn-accent { background: var(--accent); }
  .btn.btn-accent:hover { background: var(--accent-h); }
  .btn.btn-ghost {
    background: transparent;
    color: var(--text-2);
    border: 1px solid var(--border);
  }
  .btn.btn-ghost:hover { background: var(--surface-2); color: var(--text); }
  .btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .btn-row .hint { font-size: .75rem; color: var(--text-3); margin-left: auto; }

  /* ===== Rating stars ===== */
  .rating-wrap {
    display: flex; flex-direction: column; gap: 12px;
    align-items: center;
  }
  .rating-display {
    font-size: 3rem;
    font-weight: 700;
    font-family: var(--mono);
    letter-spacing: -.03em;
    color: var(--text);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .rating-display .of { font-size: 1.125rem; color: var(--text-3); font-weight: 400; }
  .rating-buttons {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    width: 100%;
  }
  .rating-btn {
    aspect-ratio: 1;
    border: 1px solid var(--border);
    background: var(--surface-2);
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: .875rem;
    font-weight: 600;
    color: var(--text-2);
    cursor: pointer;
    transition: all .12s;
  }
  .rating-btn:hover {
    background: #fff;
    border-color: var(--border-h);
    color: var(--text);
    transform: translateY(-1px);
  }
  .rating-btn.active {
    background: var(--text);
    border-color: var(--text);
    color: #fff;
  }
  @media (max-width: 500px) {
    .rating-buttons { grid-template-columns: repeat(5, 1fr); }
  }

  /* ===== History ===== */
  .history-section { margin-bottom: 24px; }
  .history-item {
    display: flex;
    gap: 14px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .history-item:last-child { border-bottom: none; }
  .history-date {
    flex-shrink: 0;
    font-size: .75rem;
    font-family: var(--mono);
    color: var(--text-3);
    padding-top: 3px;
    min-width: 88px;
  }
  .history-content { flex: 1; min-width: 0; }
  .history-top {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .history-score {
    display: inline-flex; align-items: center; gap: 3px;
    font-family: var(--mono);
    font-size: .75rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface-2);
    color: var(--text-2);
  }
  .history-score.high { background: #e7f5ee; color: var(--green); }
  .history-score.mid  { background: #fdf6e0; color: #a77f02; }
  .history-score.low  { background: #fdeeee; color: var(--red); }
  .history-thought {
    font-size: .9375rem;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .history-empty { font-size: .875rem; color: var(--text-3); font-style: italic; }
  .history-actions {
    flex-shrink: 0;
    display: flex; gap: 4px; align-items: flex-start; padding-top: 2px;
  }
  .delete-btn {
    width: 24px; height: 24px;
    background: transparent;
    border: none;
    color: var(--text-3);
    cursor: pointer;
    border-radius: var(--radius);
    font-size: .875rem;
    transition: all .12s;
  }
  .delete-btn:hover { background: #fdeeee; color: var(--red); }

  /* ===== Stats ===== */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    text-align: center;
  }
  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--text);
    letter-spacing: -.02em;
    font-variant-numeric: tabular-nums;
  }
  .stat-label {
    font-size: .75rem;
    color: var(--text-3);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    padding: 10px 18px;
    background: var(--text);
    color: #fff;
    border-radius: var(--radius);
    font-size: .875rem;
    box-shadow: var(--shadow);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s, transform .25s;
    z-index: 1000;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== Footer ===== */
  .footer {
    text-align: center;
    padding: 24px;
    color: var(--text-3);
    font-size: .75rem;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: slideUp .35s ease forwards; opacity: 0; }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="header-dot"></div>
    <h1>每日仪表盘 <span>· 倒计时 & 日记</span></h1>
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="btn-export" title="导出数据">⬇</button>
  </div>
</header>

<div class="dashboard">

  <!-- Countdown -->
  <section class="countdown-section fade-in" style="animation-delay:.05s">
    <div class="section-label">⏳ 倒计时</div>
    <div class="countdown-card">
      <div class="countdown-label">距离目标日期还有</div>
      <div>
        <span class="countdown-days" id="days">—</span><span class="countdown-unit">天</span>
      </div>
      <div class="countdown-target">目标日期：<strong>2026 年 9 月 1 日</strong></div>
      <div class="countdown-sub" id="countdown-sub"></div>
    </div>
  </section>

  <!-- Stats -->
  <section class="stats-row fade-in" style="animation-delay:.08s">
    <div class="stat-card">
      <div class="stat-value" id="stat-entries">0</div>
      <div class="stat-label">记录天数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-avg">—</div>
      <div class="stat-label">平均分</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-streak">0</div>
      <div class="stat-label">连续天数</div>
    </div>
  </section>

  <!-- Today's input -->
  <div class="grid-2">
    <!-- Thought -->
    <section class="panel fade-in" style="animation-delay:.1s">
      <div class="panel-header">
        <div class="panel-title">✍ 今日想法</div>
        <span class="panel-count" id="today-date-label"></span>
      </div>
      <div class="panel-body">
        <div class="form-row">
          <textarea class="input" id="thought-input" placeholder="记录一下今天的想法、状态、心情…"></textarea>
          <div class="btn-row">
            <button class="btn btn-accent" id="btn-save-thought">保存想法</button>
            <span class="hint" id="thought-hint"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- Rating -->
    <section class="panel fade-in" style="animation-delay:.15s">
      <div class="panel-header">
        <div class="panel-title">⭐ 今日打分</div>
        <span class="panel-count">1 - 10</span>
      </div>
      <div class="panel-body">
        <div class="rating-wrap">
          <div class="rating-display"><span id="rating-value">—</span><span class="of"> / 10</span></div>
          <div class="rating-buttons" id="rating-buttons"></div>
          <div class="btn-row" style="width:100%; justify-content:center;">
            <span class="hint" id="rating-hint" style="margin-left:0"></span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- History -->
  <section class="history-section fade-in" style="animation-delay:.2s">
    <div class="section-label">📖 历史记录</div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">全部记录</div>
        <span class="panel-count" id="history-count">0</span>
      </div>
      <div id="history-list"></div>
    </div>
  </section>

</div>

<footer class="footer">
  数据保存在浏览器本地（localStorage） · 清空浏览器数据会丢失记录
</footer>

<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';

  const TARGET_DATE = new Date(2026, 8, 1); // 2026-09-01 (month is 0-indexed)
  const STORAGE_KEY = 'daily-dashboard-v1';

  const $ = (id) => document.getElementById(id);

  // ===== Storage =====
  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return {};
      return JSON.parse(raw) || {};
    } catch (e) {
      return {};
    }
  }
  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  // ===== Date helpers =====
  function todayKey() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }
  function startOfDay(d) {
    const x = new Date(d);
    x.setHours(0, 0, 0, 0);
    return x;
  }
  function daysBetween(a, b) {
    const MS = 24 * 60 * 60 * 1000;
    return Math.round((startOfDay(b) - startOfDay(a)) / MS);
  }
  function formatDateCN(dateStr) {
    const [y, m, d] = dateStr.split('-');
    return `${y}年${parseInt(m)}月${parseInt(d)}日`;
  }

  // ===== Countdown =====
  function renderCountdown() {
    const now = new Date();
    const diff = daysBetween(now, TARGET_DATE);
    const $days = $('days');
    const $sub  = $('countdown-sub');
    if (diff > 0) {
      $days.textContent = diff.toLocaleString();
      const weeks = (diff / 7).toFixed(1);
      const months = (diff / 30).toFixed(1);
      $sub.textContent = `约 ${weeks} 周 · 约 ${months} 个月`;
    } else if (diff === 0) {
      $days.textContent = '0';
      $sub.textContent = '🎉 今天就是目标日！';
    } else {
      $days.textContent = Math.abs(diff).toLocaleString();
      $sub.textContent = `目标日已过去 ${Math.abs(diff)} 天`;
    }
  }

  // ===== Today label =====
  function renderTodayLabel() {
    $('today-date-label').textContent = todayKey();
  }

  // ===== Rating buttons =====
  function renderRatingButtons(current) {
    const wrap = $('rating-buttons');
    wrap.innerHTML = '';
    for (let i = 1; i <= 10; i++) {
      const b = document.createElement('button');
      b.className = 'rating-btn' + (current === i ? ' active' : '');
      b.textContent = i;
      b.addEventListener('click', () => onRate(i));
      wrap.appendChild(b);
    }
    $('rating-value').textContent = current ? current : '—';
  }

  function onRate(score) {
    const data = loadData();
    const key = todayKey();
    data[key] = data[key] || {};
    data[key].score = score;
    data[key].scoreAt = new Date().toISOString();
    saveData(data);
    renderAll();
    toast(`已记录 ${score} / 10`);
  }

  // ===== Today's thought =====
  function renderTodayThought() {
    const data = loadData();
    const today = data[todayKey()];
    const $ta = $('thought-input');
    const $hint = $('thought-hint');
    if (today && today.thought) {
      $ta.value = today.thought;
      $hint.textContent = `上次保存：${new Date(today.thoughtAt).toLocaleTimeString('zh-CN')}`;
    } else {
      $hint.textContent = '';
    }
    const r = $('rating-hint');
    if (today && typeof today.score === 'number') {
      r.textContent = `上次打分：${new Date(today.scoreAt).toLocaleTimeString('zh-CN')}`;
    } else {
      r.textContent = '';
    }
  }

  function onSaveThought() {
    const $ta = $('thought-input');
    const txt = $ta.value.trim();
    const data = loadData();
    const key = todayKey();
    data[key] = data[key] || {};
    if (txt) {
      data[key].thought = txt;
      data[key].thoughtAt = new Date().toISOString();
    } else {
      delete data[key].thought;
      delete data[key].thoughtAt;
    }
    // clean empty entries
    if (!data[key].thought && typeof data[key].score !== 'number') {
      delete data[key];
    }
    saveData(data);
    renderAll();
    toast(txt ? '已保存今日想法' : '已清空今日想法');
  }

  // ===== History =====
  function scoreClass(s) {
    if (s >= 8) return 'high';
    if (s >= 5) return 'mid';
    return 'low';
  }

  function renderHistory() {
    const data = loadData();
    const keys = Object.keys(data).sort((a, b) => b.localeCompare(a));
    const $list = $('history-list');
    $('history-count').textContent = keys.length;

    if (!keys.length) {
      $list.innerHTML = '<div class="panel-body"><div class="history-empty">还没有任何记录，从今天开始吧～</div></div>';
      return;
    }

    let html = '';
    for (const k of keys) {
      const item = data[k];
      const hasThought = item.thought && item.thought.trim();
      const hasScore = typeof item.score === 'number';
      html += `<div class="history-item" data-key="${k}">
        <div class="history-date">${k}</div>
        <div class="history-content">
          <div class="history-top">
            ${hasScore ? `<span class="history-score ${scoreClass(item.score)}">⭐ ${item.score}/10</span>` : '<span class="history-score">未打分</span>'}
          </div>
          ${hasThought ? `<div class="history-thought">${escapeHtml(item.thought)}</div>` : '<div class="history-empty">（无想法）</div>'}
        </div>
        <div class="history-actions">
          <button class="delete-btn" data-del="${k}" title="删除这一天">✕</button>
        </div>
      </div>`;
    }
    $list.innerHTML = html;

    $list.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', () => {
        const k = btn.getAttribute('data-del');
        if (!confirm(`确认删除 ${k} 的记录？`)) return;
        const d = loadData();
        delete d[k];
        saveData(d);
        renderAll();
        toast('已删除');
      });
    });
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ===== Stats =====
  function renderStats() {
    const data = loadData();
    const keys = Object.keys(data);
    $('stat-entries').textContent = keys.length;

    const scores = keys.map(k => data[k].score).filter(s => typeof s === 'number');
    $('stat-avg').textContent = scores.length
      ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1)
      : '—';

    // streak: consecutive days up to today that have any entry
    let streak = 0;
    const today = new Date();
    for (let i = 0; i < 3650; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if (data[key]) streak++;
      else break;
    }
    $('stat-streak').textContent = streak;
  }

  // ===== Toast =====
  let toastTimer = null;
  function toast(msg) {
    const el = $('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
  }

  // ===== Export =====
  function onExport() {
    const data = loadData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `daily-dashboard-${todayKey()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('已导出');
  }

  // ===== Master render =====
  function renderAll() {
    renderCountdown();
    renderTodayLabel();
    const data = loadData();
    const today = data[todayKey()];
    renderRatingButtons(today && typeof today.score === 'number' ? today.score : null);
    renderTodayThought();
    renderStats();
    renderHistory();
  }

  // ===== Init =====
  $('btn-save-thought').addEventListener('click', onSaveThought);
  $('btn-export').addEventListener('click', onExport);
  // Ctrl/Cmd + Enter to save thought
  $('thought-input').addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      onSaveThought();
    }
  });

  renderAll();
  // refresh countdown on date rollover
  setInterval(renderCountdown, 60 * 1000);
})();
</script>

</body>
</html>
