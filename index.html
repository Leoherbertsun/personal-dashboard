<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Dashboard</title>
<style>
  /* ========== Reset & Base ========== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #ffffff;
    --surface:   #ffffff;
    --surface-2: #f7f7f5;
    --border:    #e8e8e4;
    --border-h:  #d4d4d0;
    --text:      #37352f;
    --text-2:    #787774;
    --text-3:    #b4b4b0;
    --accent:    #2eaadc;
    --accent-h:  #1a9dc9;
    --red:       #e03e3e;
    --green:     #0f7b6c;
    --yellow:    #dfab01;
    --purple:    #6940a5;
    --radius:    6px;
    --radius-lg: 8px;
    --font:      -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --mono:      'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --shadow:    0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }

  html { font-size: 16px; }
  body {
    font-family: var(--font);
    background: var(--surface-2);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ========== Header ========== */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .header-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  .header h1 {
    font-size: .9375rem; font-weight: 600;
    letter-spacing: -.01em; color: var(--text);
  }

  .header h1 span { color: var(--text-3); font-weight: 400; }

  .header-actions { display: flex; gap: 6px; }

  .btn-icon {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: none;
    border-radius: var(--radius);
    color: var(--text-2);
    cursor: pointer; transition: all .15s;
    font-size: .875rem;
  }

  .btn-icon:hover {
    background: var(--surface-2);
    color: var(--text);
  }

  /* ========== Loading & Error ========== */
  .loading-container {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 120px 24px; gap: 16px;
  }

  .spinner {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-top-color: var(--text-2);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }

  .loading-text {
    color: var(--text-2); font-size: .875rem;
  }

  .error-box {
    margin: 24px; padding: 14px 18px;
    background: #fdf2f2;
    border: 1px solid #fecaca;
    border-radius: var(--radius);
    color: var(--red);
    font-size: .875rem;
    display: flex; align-items: center; gap: 10px;
  }

  .error-box svg { flex-shrink: 0; }

  /* ========== Dashboard Layout ========== */
  .dashboard {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px;
  }

  /* Status Banner */
  .status-section {
    margin-bottom: 24px;
  }

  .section-label {
    font-size: .75rem; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-3);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1; height: 1px;
    background: var(--border);
  }

  .status-card {
    padding: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    text-align: center;
    box-shadow: var(--shadow-sm);
  }

  .status-card .status-text {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -.02em;
    line-height: 1.3;
    color: var(--text);
  }

  .status-card .status-meta {
    margin-top: 6px;
    font-size: .8rem;
    color: var(--text-3);
  }

  .status-empty {
    color: var(--text-3);
    font-style: italic;
    font-size: .9375rem;
  }

  /* ========== Resizable Main Grid ========== */
  .main-grid {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    min-height: 420px;
  }

  .main-grid .panel { flex: 1; min-width: 200px; }

  .resize-handle {
    width: 8px;
    cursor: col-resize;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
    user-select: none;
  }

  .resize-handle::after {
    content: '';
    width: 3px; height: 32px;
    border-radius: 2px;
    background: var(--border);
    transition: background .15s, height .15s;
  }

  .resize-handle:hover::after,
  .resize-handle.active::after {
    background: var(--accent);
    height: 48px;
  }

  /* Panels */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }

  .panel-title {
    font-size: .8125rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--text-2);
    display: flex; align-items: center; gap: 8px;
  }

  .panel-count {
    background: var(--surface-2);
    color: var(--text-3);
    font-size: .6875rem;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
    font-family: var(--mono);
  }

  .panel-body {
    padding: 6px;
    overflow-y: auto;
    flex: 1;
  }

  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 2px; }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-3);
    font-size: .875rem;
  }

  /* Todo Items */
  .todo-item {
    display: flex; align-items: flex-start;
    gap: 10px; padding: 10px 12px;
    border-radius: var(--radius);
    transition: background .12s;
  }

  .todo-item:hover { background: var(--surface-2); }

  .todo-checkbox {
    flex-shrink: 0;
    width: 16px; height: 16px;
    border: 1.5px solid var(--border-h);
    border-radius: 3px;
    margin-top: 3px;
  }

  .todo-content { flex: 1; min-width: 0; }

  .todo-title {
    font-size: .9375rem;
    font-weight: 400;
    word-wrap: break-word;
    color: var(--text);
  }

  .todo-title a { color: var(--text); text-decoration: none; }
  .todo-title a:hover { text-decoration: underline; }

  .todo-meta {
    font-size: .75rem;
    color: var(--text-3);
    margin-top: 2px;
  }

  /* Idea Cards */
  .idea-card {
    padding: 14px;
    margin: 4px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    transition: all .12s;
    background: var(--surface);
  }

  .idea-card:hover {
    border-color: var(--border-h);
    box-shadow: var(--shadow);
  }

  .idea-card + .idea-card { margin-top: 6px; }

  .idea-title {
    font-size: .9375rem;
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--text);
  }

  .idea-title a { color: var(--text); text-decoration: none; }
  .idea-title a:hover { text-decoration: underline; }

  .idea-body {
    font-size: .8125rem;
    color: var(--text-2);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .idea-footer {
    margin-top: 8px;
    font-size: .75rem;
    color: var(--text-3);
    display: flex; align-items: center; gap: 6px;
  }

  /* Log Stream */
  .log-section { margin-bottom: 24px; }

  .log-item {
    display: flex;
    gap: 14px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    transition: background .12s;
  }

  .log-item:last-child { border-bottom: none; }
  .log-item:hover { background: var(--surface-2); }

  .log-time {
    flex-shrink: 0;
    font-size: .75rem;
    font-family: var(--mono);
    color: var(--text-3);
    padding-top: 2px;
    min-width: 72px;
  }

  .log-content { flex: 1; min-width: 0; }

  .log-title {
    font-size: .875rem;
    font-weight: 400;
  }

  .log-title a { color: var(--text); text-decoration: none; }
  .log-title a:hover { text-decoration: underline; }

  .log-body {
    font-size: .8125rem;
    color: var(--text-2);
    margin-top: 2px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px;
    color: var(--text-3);
    font-size: .75rem;
  }

  .footer a { color: var(--text-3); }
  .footer a:hover { color: var(--text-2); }

  /* ========== Animations ========== */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in {
    animation: slideUp .35s ease forwards;
    opacity: 0;
  }

  /* ========== Responsive ========== */
  @media (max-width: 768px) {
    .main-grid { flex-direction: column; min-height: unset; }
    .main-grid .panel { min-height: 200px; }
    .resize-handle { display: none; }
    .status-card .status-text { font-size: 1.125rem; }
    .header h1 { font-size: .875rem; }
    .dashboard { padding: 16px; }
    .log-item { flex-direction: column; gap: 2px; }
    .log-time { min-width: unset; }
  }

  /* ========== Label Badges ========== */
  .label-badge {
    display: inline-block;
    font-size: .6875rem;
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 500;
    margin-left: 5px;
    vertical-align: middle;
  }

  /* ========== No-select on drag ========== */
  body.resizing { cursor: col-resize; user-select: none; }
</style>
</head>
<body>

<div id="app">
  <header class="header">
    <div class="header-left">
      <div class="header-dot"></div>
      <h1 id="header-title">Dashboard</h1>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="btn-refresh" title="刷新数据">↻</button>
    </div>
  </header>

  <div id="content"></div>

  <footer class="footer">
    Powered by <a href="https://docs.github.com/en/rest" target="_blank">GitHub API</a> · Data from Issues
  </footer>
</div>

<script>
(function () {
  'use strict';

  const $content = document.getElementById('content');
  const $title   = document.getElementById('header-title');
  const $refresh = document.getElementById('btn-refresh');

  const GH_USER = 'Leoherbertsun';
  const GH_REPO = 'personal-dashboard';
  const API = 'https://api.github.com';

  // ===== Helpers =====
  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function timeAgo(date) {
    const diff = Date.now() - new Date(date);
    const m = Math.floor(diff / 60000);
    if (m < 1) return '刚刚';
    if (m < 60) return m + ' 分钟前';
    const h = Math.floor(m / 60);
    if (h < 24) return h + ' 小时前';
    const d = Math.floor(h / 24);
    if (d < 30) return d + ' 天前';
    return Math.floor(d / 30) + ' 个月前';
  }

  function fmtDate(date) {
    return new Date(date).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
  }

  function labelStyle(color) {
    return `background:#${color}18;color:#${color};border:1px solid #${color}33;`;
  }

  function badges(labels, exclude) {
    return labels
      .filter(l => l.name.toLowerCase() !== exclude)
      .map(l => `<span class="label-badge" style="${labelStyle(l.color)}">${esc(l.name)}</span>`)
      .join('');
  }

  // ===== API =====
  async function fetchIssues(user, repo) {
    const all = [];
    let page = 1;
    while (true) {
      const r = await fetch(
        `${API}/repos/${user}/${repo}/issues?state=open&per_page=100&page=${page}&sort=created&direction=desc`,
        { headers: { Accept: 'application/vnd.github.v3+json' } }
      );
      if (!r.ok) {
        const e = await r.json().catch(() => ({}));
        throw new Error(e.message || `HTTP ${r.status}`);
      }
      const d = await r.json();
      all.push(...d.filter(i => !i.pull_request));
      if (d.length < 100) break;
      page++;
    }
    return all;
  }

  function classify(issues) {
    const r = { status: [], todo: [], idea: [], log: [] };
    for (const i of issues) {
      const n = i.labels.map(l => l.name.toLowerCase());
      if (n.includes('status')) r.status.push(i);
      else if (n.includes('todo')) r.todo.push(i);
      else if (n.includes('idea')) r.idea.push(i);
      else r.log.push(i);
    }
    return r;
  }

  // ===== Render =====
  function render(data, user, repo) {
    const { status, todo, idea, log } = data;
    let h = '<div class="dashboard">';

    // Status
    h += '<div class="status-section fade-in" style="animation-delay:.05s">';
    h += '<div class="section-label">📡 当前状态</div>';
    if (status.length) {
      const s = status[0];
      h += `<div class="status-card">
        <div class="status-text">${esc(s.title)}</div>
        <div class="status-meta">更新于 ${timeAgo(s.updated_at)}</div>
      </div>`;
    } else {
      h += '<div class="status-card"><div class="status-empty">暂无状态 — 创建带 "Status" 标签的 Issue 来更新</div></div>';
    }
    h += '</div>';

    // Main Grid (resizable)
    h += '<div class="main-grid" id="mainGrid">';

    // Todo
    h += '<div class="panel fade-in" style="animation-delay:.1s" id="panelLeft">';
    h += `<div class="panel-header"><div class="panel-title">☑ 待办清单</div><span class="panel-count">${todo.length}</span></div>`;
    h += '<div class="panel-body">';
    if (!todo.length) {
      h += '<div class="empty-state">🎉 暂无待办</div>';
    } else {
      for (const t of todo) {
        h += `<div class="todo-item">
          <div class="todo-checkbox"></div>
          <div class="todo-content">
            <div class="todo-title"><a href="${t.html_url}" target="_blank">${esc(t.title)}</a>${badges(t.labels,'todo')}</div>
            <div class="todo-meta">#${t.number} · ${timeAgo(t.created_at)}</div>
          </div>
        </div>`;
      }
    }
    h += '</div></div>';

    // Resize handle
    h += '<div class="resize-handle" id="resizeHandle"></div>';

    // Idea
    h += '<div class="panel fade-in" style="animation-delay:.15s" id="panelRight">';
    h += `<div class="panel-header"><div class="panel-title">💡 灵感墙</div><span class="panel-count">${idea.length}</span></div>`;
    h += '<div class="panel-body">';
    if (!idea.length) {
      h += '<div class="empty-state">等待灵光一现…</div>';
    } else {
      for (const i of idea) {
        h += `<div class="idea-card">
          <div class="idea-title"><a href="${i.html_url}" target="_blank">${esc(i.title)}</a>${badges(i.labels,'idea')}</div>
          ${i.body ? `<div class="idea-body">${esc(i.body)}</div>` : ''}
          <div class="idea-footer"><span>#${i.number}</span> · <span>${fmtDate(i.created_at)}</span></div>
        </div>`;
      }
    }
    h += '</div></div>';
    h += '</div>'; // main-grid

    // Log
    h += '<div class="log-section fade-in" style="animation-delay:.2s">';
    h += '<div class="section-label">📝 日志流</div>';
    h += '<div class="panel">';
    h += `<div class="panel-header"><div class="panel-title">未分类</div><span class="panel-count">${log.length}</span></div>`;
    if (!log.length) {
      h += '<div class="panel-body"><div class="empty-state">没有未分类的 Issue</div></div>';
    } else {
      for (const l of log) {
        h += `<div class="log-item">
          <div class="log-time">${fmtDate(l.created_at)}</div>
          <div class="log-content">
            <div class="log-title"><a href="${l.html_url}" target="_blank">${esc(l.title)}</a></div>
            ${l.body ? `<div class="log-body">${esc(l.body)}</div>` : ''}
          </div>
        </div>`;
      }
    }
    h += '</div></div>';

    h += '</div>';
    $content.innerHTML = h;

    // Init resize
    initResize();
  }

  // ===== Resize Logic =====
  function initResize() {
    const handle = document.getElementById('resizeHandle');
    const grid   = document.getElementById('mainGrid');
    const left   = document.getElementById('panelLeft');
    const right  = document.getElementById('panelRight');
    if (!handle || !grid || !left || !right) return;

    let startX, startLeftW, totalW;

    function onDown(e) {
      e.preventDefault();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      startX = clientX;
      startLeftW = left.getBoundingClientRect().width;
      totalW = grid.getBoundingClientRect().width - handle.getBoundingClientRect().width;
      document.body.classList.add('resizing');
      handle.classList.add('active');
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onUp);
    }

    function onMove(e) {
      e.preventDefault();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const dx = clientX - startX;
      let newLeft = startLeftW + dx;
      const minW = 180;
      newLeft = Math.max(minW, Math.min(newLeft, totalW - minW));
      const pct = (newLeft / totalW) * 100;
      left.style.flex = 'none';
      left.style.width = pct + '%';
      right.style.flex = 'none';
      right.style.width = (100 - pct) + '%';
    }

    function onUp() {
      document.body.classList.remove('resizing');
      handle.classList.remove('active');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
    }

    handle.addEventListener('mousedown', onDown);
    handle.addEventListener('touchstart', onDown, { passive: false });
  }

  // ===== Loading / Error =====
  function showLoading() {
    $content.innerHTML = `
      <div class="loading-container">
        <div class="spinner"></div>
        <div class="loading-text">正在获取数据…</div>
      </div>`;
  }

  function showError(msg) {
    $content.innerHTML = `
      <div class="error-box">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1ZM7.25 4.75a.75.75 0 0 1 1.5 0v3.5a.75.75 0 0 1-1.5 0v-3.5ZM8 11a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"/>
        </svg>
        <span>${esc(msg)}</span>
      </div>`;
  }

  // ===== Init =====
  async function load() {
    $title.innerHTML = `${esc(GH_USER)} <span>/ ${esc(GH_REPO)}</span>`;
    showLoading();
    try {
      const issues = await fetchIssues(GH_USER, GH_REPO);
      render(classify(issues), GH_USER, GH_REPO);
    } catch (err) {
      showError(`获取失败：${err.message}。请检查仓库是否存在且为 Public。`);
    }
  }

  $refresh.addEventListener('click', load);
  load();
})();
</script>

</body>
</html>
